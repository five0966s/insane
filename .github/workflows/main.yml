name: Build INSANE.tf2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install DirectX SDK (June 2010)
      # This uses Chocolatey to find and install the SDK automatically
      run: choco install directx-sdk -y

    - name: Configure CMake
      # We tell CMake exactly where the SDK was installed
      run: cmake -G "Visual Studio 17 2022" -A x64 -S . -B Build -DDXSDK_DIR="C:/Program Files (x86)/Microsoft DirectX SDK (June 2010)"

    - name: Build Project
      run: cmake --build Build --config Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: INSANE-tf2-Release
        path: Output/Release/Insane_tf2.dll
