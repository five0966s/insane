name: Build INSANE.tf2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Download DirectX 9 SDK
      shell: powershell
      run: |
        $url = "https://download.microsoft.com/download/A/E/7/AE743F1F-6941-49F9-858E-F8653B3AD1A4/directx_jun2010_redist.exe"
        Invoke-WebRequest -Uri $url -OutFile "dxsdk.exe"
        # Extract to a shorter path for easier linking
        Start-Process -FilePath "dxsdk.exe" -ArgumentList "/Q /T:C:\dxsdk" -Wait

    - name: Configure CMake
      # This runs the command from your CreateBuildFiles.bat 
      run: cmake -G "Visual Studio 17 2022" -A x64 -S . -B Build

    - name: Build Release
      run: cmake --build Build --config Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: INSANE-tf2-Release
        path: Output/Release/Insane_tf2.dll
